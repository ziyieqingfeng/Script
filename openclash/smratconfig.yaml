proxy-providers:
  自建节点:
    type: http
    url: "https://xxxxxxx.com/"                 # 关键修改:填写你的代理订阅地址，确保返回的内容是 Clash 兼容的代理列表，可以用sub-store搭建
    path: "./proxy_provider/自建节点.yaml"
    interval: 3600
    health-check:
      enable: true
      url: "http://www.gstatic.com/generate_204"
      interval: 300
proxy-groups:
  - name: Smart-US
    type: smart
    use:
      - 自建节点
    filter: "美国|US|United States"               # 关键修改:只使用名字中包含“美国”、“US”或“United States”的节点
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    policy-priority: Sky:1.1;Web:1                # 节点权重:openclash内有窗口填写，但会影响所有smart组，所以在这里设置只影响这个组，依照自己节点命名修改.
  - name: Smart-JP
    type: smart
    use:
      - 自建节点
    filter: "日本|JP|Japan"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    policy-priority: Dip:1;Sip:1                  # 节点权重:openclash内有窗口填写，但会影响所有smart组，所以在这里设置只影响这个组，依照自己节点命名修改.
  - name: Smart-Auto
    type: smart
    use:
      - 自建节点
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    policy-priority: 美国:1.3;日本:0.8             # 节点权重:openclash内有窗口填写，但会影响所有smart组，所以在这里设置只影响这个组，依照自己节点命名修改.
  - name: Proxy
    type: select
    proxies:
      - Smart-Auto
      - Smart-US
      - Smart-JP
      - DIRECT
    use:
      - 自建节点
  - name: Domestic
    type: select
    proxies:
      - DIRECT
      - Proxy
  - name: Global WEB
    type: select
    proxies:
      - Proxy
      - Smart-US
      - Smart-JP
      - DIRECT
    use:
      - 自建节点
  - name: CN Mainland TV
    type: select
    proxies:
      - DIRECT
      - Proxy
  - name: Asian TV
    type: select
    proxies:
      - Proxy
      - Smart-JP
      - Smart-US
    use:
      - 自建节点
    filter: "日本|JP|Japan"
  - name: Global TV
    type: select
    proxies:
      - Proxy
      - Smart-US
      - Smart-JP
    use:
      - 自建节点
    filter: "美国|US|United States"
  - name: Others
    type: select
    proxies:
      - Proxy
      - DIRECT
      - Domestic
  - name: AI Suite
    type: select
    proxies:
      - Proxy
      - Smart-US
      - Smart-JP
    use:
      - 自建节点
  - name: Google
    type: select
    proxies:
      - Proxy
      - Smart-US
      - Smart-JP
    use:
      - 自建节点
  - name: X
    type: select
    proxies:
      - Proxy
      - Smart-US
      - Smart-JP
    use:
      - 自建节点
  - name: Telegram
    type: select
    proxies:
      - Proxy
      - Smart-US
      - Smart-JP
    use:
      - 自建节点
  - name: Discord
    type: select
    proxies:
      - Proxy
      - DIRECT
    use:
      - 自建节点
  - name: PayPal
    type: select
    proxies:
      - DIRECT
      - Proxy
    use:
      - 自建节点
  - name: Microsoft
    type: select
    proxies:
      - Proxy
      - DIRECT
  - name: Apple
    type: select
    proxies:
      - Proxy
      - DIRECT
    use:
      - 自建节点
  - name: Google FCM
    type: select
    proxies:
      - Proxy
      - DIRECT
    use:
      - 自建节点
  - name: Scholar
    type: select
    proxies:
      - DIRECT
      - Proxy
    use:
      - 自建节点
  - name: Steam
    type: select
    proxies:
      - Proxy
      - DIRECT
    use:
      - 自建节点
  - name: Apple News
    type: select
    proxies:
      - Proxy
      - DIRECT
    use:
      - 自建节点
  - name: Crypto
    type: select
    proxies:
      - Proxy
      - DIRECT
    use:
      - 自建节点
  - name: Bilibili
    type: select
    proxies:
      - CN Mainland TV
    use:
      - 自建节点
  - name: Spotify
    type: select
    proxies:
      - Global TV
    use:
      - 自建节点
  - name: Youtube
    type: select
    disable-udp: true
    proxies:
      - Global TV
    use:
      - 自建节点
  - name: TikTok
    type: select
    proxies:
      - Global TV
    use:
      - 自建节点
  - name: Apple TV
    type: select
    proxies:
      - Global TV
      - DIRECT
    use:
      - 自建节点
  - name: Netflix
    type: select
    proxies:
      - Global TV
    use:
      - 自建节点
  - name: HBO Max
    type: select
    proxies:
      - Global TV
    use:
      - 自建节点
  - name: Disney Plus
    type: select
    proxies:
      - Global TV
    use:
      - 自建节点
  - name: Discovery Plus
    type: select
    proxies:
      - Global TV
    use:
      - 自建节点
  - name: DAZN
    type: select
    proxies:
      - Global TV
    use:
      - 自建节点
  - name: Bahamut
    type: select
    proxies:
      - Global TV
    use:
      - 自建节点
  - name: Speedtest
    type: select
    proxies:
      - DIRECT
    use:
      - 自建节点
  - name: AdBlock
    type: select
    proxies:
      - REJECT
      - DIRECT
      - Proxy
