proxy-providers:
  自建节点:
    type: http
    url: "https://xxxxxxx.com/"                 # 填写你的代理订阅地址，确保返回的内容是 Clash 兼容的代理列表，可以用sub-store搭建
    path: "./proxy_provider/自建节点.yaml"
    interval: 3600
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 300
proxy-groups:      # 策略组配置以及排序
  - name: Auto - UrlTest
    type: url-test
    use:
      - 自建节点
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 150
  - name: 故障切换-US
    type: fallback
    use:
      - 自建节点
    filter: "美国|US|United States"        # 关键修改:只使用名字中包含“美国”、“US”或“United States”的节点
    url: http://cp.cloudflare.com/generate_204
    interval: 300        # 测速间隔300秒
    timeout: 1000        # 核心参数：如果 1 秒没响应，才认为节点坏了
  - name: 故障切换-JP
    type: fallback
    use:
      - 自建节点
    filter: "日本|JP|Japan"
    url: http://cp.cloudflare.com/generate_204
    interval: 300        # 测速间隔300秒
    timeout: 1000        # 核心参数：如果 1 秒没响应，才认为节点坏了 
  - name: 负载均衡-US
    type: load-balance
    strategy: consistent-hashing     # 使用一致性哈希，避免跳 IP
    use:
      - 自建节点
    filter: "美国|US|United States"    # 关键修改:只使用名字中包含“美国”、“US”或“United States”的节点
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 60      # 测速间隔60秒
      lazy: true     # 不使用不测速
  - name: 负载均衡-JP
    type: load-balance
    strategy: consistent-hashing 
    use:
      - 自建节点
    filter: "日本|JP|Japan"    
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 60
      lazy: true  
  - name: Proxy
    type: select
    proxies:
      - Auto - UrlTest
      - 故障切换-US
      - 故障切换-JP
      - 负载均衡-US
      - 负载均衡-JP
      - DIRECT
    use:
      - 自建节点
  - name: 中土通达
    type: select
    proxies:
      - DIRECT
      - Proxy
  - name: 社交媒体
    type: select
    proxies:
      - Proxy
      - 故障切换-US
      - 故障切换-JP
    use:
      - 自建节点
  - name: 寰宇纵横
    type: select
    proxies:
      - Proxy
      - 故障切换-US
      - 故障切换-JP
    use:
      - 自建节点
  - name: 华夏视听
    type: select
    proxies:
      - DIRECT
      - Proxy
  - name: 东方视听
    type: select
    proxies:
      - Proxy
      - 故障切换-JP
      - 故障切换-US
    use:
      - 自建节点
    filter: "日本|JP|Japan"
  - name: 环球视听
    type: select
    proxies:
      - Proxy
      - 故障切换-US
      - 故障切换-JP
    use:
      - 自建节点
    filter: "美国|US|United States"
  - name: AI Suite
    type: select
    proxies:
      - Proxy
      - 故障切换-US
      - 故障切换-JP
    use:
      - 自建节点
  - name: Google
    type: select
    proxies:
      - Proxy
      - 故障切换-US
      - 故障切换-JP
    use:
      - 自建节点
  - name: PayPal
    type: select
    proxies:
      - DIRECT
      - Proxy
    use:
      - 自建节点
  - name: Microsoft
    type: select
    proxies:
      - Proxy
      - DIRECT
  - name: Apple
    type: select
    proxies:
      - Proxy
      - DIRECT
    use:
      - 自建节点
  - name: Google FCM
